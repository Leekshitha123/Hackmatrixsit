<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Relax Activities 🌈</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #42275a, #734b6d);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 30px;
            color: white;
        }

        .container {
            width: 420px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        h2,
        h3 {
            text-align: center;
        }

        section {
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 15px;
            padding: 15px;
        }

        .bubble {
            font-size: 36px;
            margin: 5px;
            cursor: pointer;
            display: inline-block;
            animation: float 3s infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }

            100% {
                transform: translateY(0);
            }
        }

        canvas {
            border: 2px solid #fff;
            border-radius: 10px;
            width: 100%;
            height: 150px;
            background: white;
        }

        #spinner {
            font-size: 50px;
            cursor: pointer;
            transition: transform 0.6s ease;
            display: block;
            margin: auto;
        }

        button {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            margin: 6px;
            cursor: pointer;
            background: linear-gradient(45deg, #a18cd1, #fbc2eb);
            color: black;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.05);
        }

        select,
        input {
            padding: 8px;
            border-radius: 8px;
            border: none;
            margin-top: 10px;
            width: 90%;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Relax & Play 🌈</h2>

        <!-- Bubble Pop -->
        <section>
            <h3>Bubble Pop 🫧</h3>
            <div id="bubblesContainer"></div>
            <button id="addBubbles">Add More Bubbles</button>
        </section>

        <!-- Drawing -->
        <section>
            <h3>Draw 🎨</h3>
            <canvas id="draw" width="350" height="150"></canvas>
        </section>

        <!-- Spinner -->
        <section>
            <h3>Fidget Spinner 🌀</h3>
            <div id="spinner">🌀</div>
        </section>

        <!-- Truth or Dare -->
        <section>
            <h3>Truth or Dare 🎲</h3>

            <label>Select Category:</label><br>
            <select id="category">
                <option value="fun">Fun 😄</option>
                <option value="self">Self Growth 🌱</option>
                <option value="deep">Deep Thoughts 🔥</option>
            </select>

            <div id="gameArea">
                <button id="truthBtn">Truth</button>
                <button id="dareBtn">Dare</button>
                <p id="gameText">Choose Truth or Dare!</p>
            </div>

        </section>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {

            /* Bubble Pop */
            const bubblesContainer = document.getElementById("bubblesContainer");
            function createBubble() {
                const b = document.createElement("span");
                b.className = "bubble";
                b.textContent = "🫧";
                b.onclick = () => b.remove();
                bubblesContainer.appendChild(b);
            }
            for (let i = 0; i < 5; i++) createBubble();
            document.getElementById("addBubbles").onclick = () => { for (let i = 0; i < 3; i++) createBubble(); };

            /* Drawing */
            const canvas = document.getElementById("draw");
            const ctx = canvas.getContext("2d");
            let drawing = false;
            canvas.onmousedown = () => drawing = true;
            canvas.onmouseup = () => drawing = false;
            canvas.onmousemove = e => {
                if (drawing) ctx.fillRect(e.offsetX, e.offsetY, 4, 4);
            };

            /* Spinner */
            let angle = 0;
            const spinner = document.getElementById("spinner");
            spinner.onclick = () => {
                angle += 360;
                spinner.style.transform = `rotate(${angle}deg)`;
            };

            /* Truth or Dare Logic */
            const truths = {
                fun: ["What makes you happy?", "Your favorite hobby?"],
                self: ["What goal are you working on?", "What motivates you?"],
                deep: ["What scares you the most?", "Your hidden strength?"]
            };

            const dares = {
                fun: ["Smile for 10 seconds 😊", "Clap your hands 5 times"],
                self: ["Write 3 good things about yourself", "Take 5 deep breaths"],
                deep: ["Close eyes and relax for 30 seconds", "Stretch your hands"]
            };

            const gameArea = document.getElementById("gameArea");
            const gameText = document.getElementById("gameText");
            const category = document.getElementById("category");

            document.getElementById("truthBtn").onclick = () => {
                const q = truths[category.value][Math.floor(Math.random() * truths[category.value].length)];
                gameArea.innerHTML = `
 <p>🟢 Truth: ${q}</p>
 <input id="answer" placeholder="Type your answer">
 <button id="next">Next</button>`;
                document.getElementById("next").onclick = () => {
                    if (!document.getElementById("answer").value.trim()) {
                        alert("Please answer!");
                        return;
                    }
                    resetGame("✅ Answer saved!");
                };
            };

            document.getElementById("dareBtn").onclick = () => {
                const d = dares[category.value][Math.floor(Math.random() * dares[category.value].length)];
                gameArea.innerHTML = `
 <p>🔴 Dare: ${d}</p>
 <button id="done">Done</button>`;
                document.getElementById("done").onclick = () => resetGame("✅ Dare completed!");
            };

            function resetGame(msg) {
                gameArea.innerHTML = `
 <button id="truthBtn">Truth</button>
 <button id="dareBtn">Dare</button>
 <p>${msg}</p>`;
                document.getElementById("truthBtn").onclick = document.getElementById("truthBtn").onclick;
                document.getElementById("dareBtn").onclick = document.getElementById("dareBtn").onclick;
                location.reload(); // simple reset
            }

        });
    </script>

</body>

</html>
